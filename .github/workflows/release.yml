name: Release on Tag

# Mechanical guarantee that every pushed v* tag gets a GitHub Release.
# The Releases page drifted from the tag history three times (versions,
# then tags, then Releases — v2.14.0/v2.15.0 backfilled days late,
# v2.17.0 only on request) because Release creation lived in
# instructions, not automation. Idempotent: re-running on an existing
# Release is a no-op, so the release-manager agent creating the Release
# first (agents/release-manager.md step 10) never conflicts.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Default shallow checkout only — CHANGELOG.md is all we need locally.
      # Do NOT add fetch-tags: on tag-push events checkout maps the trigger
      # ref to the commit SHA and fetch-tags then tries to fetch the real
      # tag ref into the same name → "Cannot fetch both <sha> and
      # refs/tags/<tag>" (broke the v2.17.1 run). The tag annotation is
      # read via the API below instead of from the local checkout.
      - uses: actions/checkout@v4

      - name: Create GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi

          # Notes: this version's CHANGELOG section (header exclusive,
          # up to the next '## [' heading).
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          if ! [ -s notes.md ]; then
            printf 'See CHANGELOG.md for %s.\n' "$TAG" > notes.md
          fi

          # Title: reuse the annotated tag subject when it follows a
          # release convention; otherwise fall back to the bare tag.
          # Read the annotation via the API — the local checkout's tag ref
          # points at the commit, not the tag object, on tag-push events.
          SUBJECT=""
          REF_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" 2>/dev/null || echo "{}")"
          OBJ_TYPE="$(printf '%s' "$REF_JSON" | jq -r '.object.type // ""')"
          OBJ_SHA="$(printf '%s' "$REF_JSON" | jq -r '.object.sha // ""')"
          if [ "$OBJ_TYPE" = "tag" ] && [ -n "$OBJ_SHA" ]; then
            SUBJECT="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${OBJ_SHA}" --jq '.message | split("\n")[0]' 2>/dev/null || echo "")"
          fi
          case "$SUBJECT" in
            "Release $TAG:"*) TITLE="$TAG —${SUBJECT#Release $TAG:}" ;;
            "$TAG — "*)       TITLE="$SUBJECT" ;;
            *)                TITLE="$TAG" ;;
          esac

          gh release create "$TAG" --title "$TITLE" --notes-file notes.md --verify-tag
